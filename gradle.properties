## For more details on how to configure your build environment visit
# http://www.gradle.org/docs/current/userguide/build_environment.html

# Memory (8GB RAM)
org.gradle.jvmargs=-Xmx3072M -Dfile.encoding=UTF-8 -Dkotlin.daemon.jvm.options="-Xmx2048M" -XX:+UseParallelGC

android.useAndroidX=true
android.enableJetifier=false
android.newDsl=false
android.nonTransitiveRClass=false
org.gradle.unsafe.configuration-cache=true

# Performance
org.gradle.parallel=false
org.gradle.daemon=false
org.gradle.configureondemand=false
org.gradle.workers.max=1
org.gradle.caching=false

# Suppress warnings
android.suppressUnsupportedOptionWarnings=android.suppressUnsupportedOptionWarnings,android.nonFinalResIds

# Network
systemProp.org.gradle.internal.http.connectionTimeout=180000
systemProp.org.gradle.internal.http.socketTimeout=180000